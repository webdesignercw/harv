    .page-title {
      margin: 0;
      text-align: center;
      font-family: "Fredoka", sans-serif;

    /* Cover Page Design */
    #coverPage {
      width: 800px;

      margin: auto;
      background: url('rit_4.png') no-repeat center/contain;
      position: relative;
      padding: 50px;

      font-family: 'Times New Roman', serif;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .center-text {
      text-align: center;

    .title {

      margin-top: 100px;
    }

    .course_name {
      font-size: 33px;
      font-weight: bold;
      margin-top: 75.5%;

      text-transform: uppercase;
      
font-family: "Fredoka", sans-serif;
  font-optical-sizing: auto;
  font-weight: bold;
  font-style: normal;
    }

    .course_code {
      font-size: 25px;

    position: absolute;
      top: 56.8%;
      left: 53%;

      font-family: "Lato", sans-serif;
 
  font-style: normal;
    }

    .info-layer {
      position: absolute;
      inset: 0;
    }

    .field-label {
      font-weight: bold;
      position: absolute;
    }

    .student-value {
      position: absolute;
      top: 78.5%;

      color: #0f172a;
      font-size: 30px;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    /* .student-value {
      position: absolute;
     top: 78.5%;
      left: 58%;
      font-size: 24px;
      font-weight: 700;
      color: #1d3557;
    } */

    .reg-value {
      position: absolute;
      top: 922px;
      left: 29%;
      font-size: 23px;
      color: #000000;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    /* .reg-value {
      position: absolute;
      top: 855px;
      left: 290px;
      font-size: 21px;
      font-weight: 600;
      color: #4c1d95;
      letter-spacing: 1px;
    } */

    .lecturer-value {
      position: absolute;
      top: 78.5%;
      left: 55%;
      font-size: 30px;
      color: #000000;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    .site-footer {
      margin-top: 28px;
      padding: 18px 12px 28px;
      text-align: center;
      font-family: "Lato", sans-serif;
      color: #334155;
    }

    .site-footer a {
      color: #b91c1c;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid rgba(185, 28, 28, 0.25);
      transition: color 0.2s ease, border-color 0.2s ease;

      color: #7f1d1d;

    /* .lecturer-value {
      position: absolute;

    } */

<body>
<div class="page-shell">

<div class="page-header">
  <h1 class="page-title">Assignment Cover Page Generator</h1>
</div>

<div class="container mt-4">

  <div class="row">
    <!-- Form -->
    <div class="col-md-4">
      <h4>Enter Details</h4>

      <input type="text" id="name" class="form-control mb-2" placeholder="Student Name" autocomplete="off">
      <input type="text" id="regNo" class="form-control mb-2" placeholder="Registration Number" autocomplete="off">
      <select id="subjectSelect" class="form-select mb-2" autocomplete="off">
        <option value="">Select Subject</option>
      </select>

      <button id="generate" class="btn btn-primary w-100 mb-2">Generate</button>
      <button id="download" class="btn btn-success w-100 mb-2">Download PNG</button>
      <button id="downloadAll" class="btn btn-warning w-100">Download All ZIP</button>
    </div>

    <!-- Preview -->
    <div class="col-md-8">
      <div id="coverPage">

        <div class="center-text">
          <!-- <div class="title">ACADEMIC ASSIGNMENT</div> -->
          <div class="course_name" id="courseText">Course Name</div>
          <div class="course_code" id="codeText">Code</div>
        </div>

        <div class="info-layer">
          <!-- <span class="field-label student-label">Student Name:</span> -->
          <span class="student-value" id="nameText">Your Name</span>

          <!-- <span class="field-label reg-label">Registration No:</span> -->
          <span class="reg-value" id="regNoText">Registration Number</span>

          <!-- <span class="field-label lecturer-label">Lecturer:</span> -->
          <span class="lecturer-value" id="lecturerText">Lecturer Name</span>
        </div>

      </div>
    </div>
  </div>

</div>

<footer class="site-footer">
  Design and Developed by
  <a href="https://www.linkedin.com/in/gyaneswar-sahu-b176a4263" target="_blank" rel="noopener noreferrer">Mr. Gyaneswar Sahu</a>
</footer>
</div>

<script>
const fallbackSubjects = [
  { code: "MBPC1004", name: "Corporate Finance", lecturer: "Dr. Santanu Das" },
  { code: "MBPC1005", name: "Cost and Management Accounting", lecturer: "Mrs. Snigdha Priyadarshini" },
  { code: "MBPC1006", name: "Human Resources Management", lecturer: "Mr. Uma Sankar Pani" },
  { code: "MBQT1002", name: "Business Research", lecturer: "Mr. Avinash Panda" },
  { code: "MBPC1007", name: "Operations Management", lecturer: "Miss. Rojalin Sahu" },
  { code: "MBPC1008", name: "Business Analytics", lecturer: "Dr. Satyajit Hotta" },
  { code: "MBPC1009", name: "Management Information System", lecturer: "Mr. Jajati Patnaik" },
  { code: "MBPC1010", name: "Strategic Management", lecturer: "Miss. Smita Senapati" },
  { code: "MBEV1202", name: "Health & Wellness", lecturer: "Dr. Santanu Das" },
  { code: "MBPC1011", name: "Introduction to AI", lecturer: "Mr. Avinash Panda" }
];

  let subjects = [];

  function populateSubjects() {
    const $subjectSelect = $("#subjectSelect");
    $subjectSelect.empty();
    $subjectSelect.append('<option value="">Select Subject</option>');

    subjects.forEach((subject, index) => {
      $subjectSelect.append(
        `<option value="${index}">${subject.code} - ${subject.name}</option>`
      );
    });
  }

  function loadSubjects() {
    $.getJSON("subjects.json")
      .done(function (data) {
        subjects = Array.isArray(data.subjects) ? data.subjects : [];
        populateSubjects();
      })
      .fail(function () {
        subjects = fallbackSubjects;
        populateSubjects();
      });
  }

  function getSelectedSubject() {
    const selectedIndex = $("#subjectSelect").val();
    if (selectedIndex === "") {
      return null;
    }

    return subjects[parseInt(selectedIndex, 10)] || null;
  }

  function updatePreview() {
    const selectedSubject = getSelectedSubject();

    $("#nameText").text($("#name").val() || "Your Name");
    $("#regNoText").text($("#regNo").val() || "Registration Number");
    $("#courseText").text(selectedSubject ? selectedSubject.name : "Course Name");
    $("#codeText").text(selectedSubject ? selectedSubject.code : "Code");
    $("#lecturerText").text(selectedSubject ? selectedSubject.lecturer : "Lecturer Name");
  }

  function renderSubject(subject) {
    $("#nameText").text($("#name").val() || "Your Name");
    $("#regNoText").text($("#regNo").val() || "Registration Number");
    $("#courseText").text(subject ? subject.name : "Course Name");
    $("#codeText").text(subject ? subject.code : "Code");
    $("#lecturerText").text(subject ? subject.lecturer : "Lecturer Name");
  }

  function makeSafeFilePart(value, fallback) {
    const cleanedValue = (value || "")
      .trim()
      .replace(/[<>:"/\\|?*\x00-\x1F]/g, "")
      .replace(/\s+/g, " ");

    return cleanedValue || fallback;
  }

  function resetForm() {
    $("#name").val("");
    $("#regNo").val("");
    $("#subjectSelect").val("");
    updatePreview();
  }

  function canvasToBlob(canvas) {
    return new Promise((resolve) => {
      canvas.toBlob(resolve, "image/png");
    });
  }

  function waitForPreviewPaint() {
    return new Promise((resolve) => requestAnimationFrame(resolve));
  }

  $("#name, #regNo").on("input", function () {
    updatePreview();
  });

  $("#subjectSelect").on("change", function () {
    updatePreview();
  });

  $("#generate").click(function () {
    updatePreview();
  });

  // Download PNG
  $("#download").click(function () {
    const selectedSubject = getSelectedSubject();
    const regNo = makeSafeFilePart($("#regNo").val(), "RegistrationNumber");
    const subjectName = makeSafeFilePart(
      selectedSubject ? selectedSubject.name : "",
      "SubjectName"
    );

    html2canvas(document.querySelector("#coverPage")).then(canvas => {
      let link = document.createElement("a");
      link.download = `${regNo} - ${subjectName}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  });

  $("#downloadAll").click(async function () {
    if (!$("#name").val().trim() || !$("#regNo").val().trim()) {
      alert("Please enter Student Name and Registration Number before downloading all cover pages.");
      return;
    }

    if (!subjects.length) {
      alert("No subjects found to download.");
      return;
    }

    if (typeof JSZip === "undefined") {
      alert("ZIP download library is still loading. Please check your internet connection and try again.");
      return;
    }

    const $button = $("#downloadAll");
    const originalText = $button.text();
    const originalSelectedSubject = $("#subjectSelect").val();
    const regNo = makeSafeFilePart($("#regNo").val(), "RegistrationNumber");
    const studentName = makeSafeFilePart($("#name").val(), "StudentName");
    const zip = new JSZip();

    $button.prop("disabled", true).text("Preparing ZIP...");

    try {
      for (const [index, subject] of subjects.entries()) {
        $button.text(`Preparing ${index + 1}/${subjects.length}...`);
        renderSubject(subject);
        await waitForPreviewPaint();

        const canvas = await html2canvas(document.querySelector("#coverPage"));
        const blob = await canvasToBlob(canvas);
        const subjectName = makeSafeFilePart(subject.name, "SubjectName");

        zip.file(`${regNo} - ${subjectName}.png`, blob);
      }

      const zipBlob = await zip.generateAsync({ type: "blob" });
      const link = document.createElement("a");
      const zipUrl = URL.createObjectURL(zipBlob);

      link.download = `${regNo} - ${studentName} - Cover Pages.zip`;
      link.href = zipUrl;
      link.click();
      setTimeout(() => URL.revokeObjectURL(zipUrl), 1000);
    } catch (error) {
      alert("Could not create the ZIP. Please try again.");
    } finally {
      $("#subjectSelect").val(originalSelectedSubject);
      updatePreview();
      $button.prop("disabled", false).text(originalText);
    }
  });

  loadSubjects();
  resetForm();
</script>

</body>
</html>
